name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-slim

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - run: pnpm install --frozen-lockfile

      - run: pnpm run format:check

      - run: pnpm run lint

      - run: pnpm run check-types

      - name: Run tests for changed codemods
        shell: bash
        run: |
          changed_paths=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }})

          filters=$(
            echo "$changed_paths" \
              | grep '^codemods/' \
              | cut -d/ -f1-3 \
              | sort -u \
              | sed 's|^|--filter ./|'
          )

          if [ -n "$filters" ]; then
            # shellcheck disable=SC2086
            pnpm $filters test
            exit 0
          fi

          if echo "$changed_paths" | grep -qE '^(package\.json|pnpm-lock\.yaml|pnpm-workspace\.yaml)$'; then
            pnpm test
            exit 0
          fi

          echo "No codemod packages affected; skipping tests."
